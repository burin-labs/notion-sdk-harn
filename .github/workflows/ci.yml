name: CI

on:
  pull_request:
  push:
    branches:
      - main
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  harn:
    name: Harn
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Read Harn version
        id: harn-version
        shell: bash
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < .harn-version)"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Cache harn-cli
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo-harn/${{ steps.harn-version.outputs.version }}
          key: harn-cli-${{ runner.os }}-${{ steps.harn-version.outputs.version }}-${{ hashFiles('.harn-version') }}
          restore-keys: |
            harn-cli-${{ runner.os }}-${{ steps.harn-version.outputs.version }}-

      - name: Install harn-cli
        shell: bash
        run: |
          set -euo pipefail
          harn_root="${HOME}/.cargo-harn/${{ steps.harn-version.outputs.version }}"
          if [[ ! -x "${harn_root}/bin/harn" ]]; then
            cargo install harn-cli --version "${{ steps.harn-version.outputs.version }}" --locked --root "${harn_root}"
          fi
          echo "${harn_root}/bin" >> "${GITHUB_PATH}"

      - name: Show Harn version
        run: harn --version

      - name: Install Harn dependencies
        run: harn install

      - name: Check
        run: harn check src scripts

      - name: Lint
        run: harn lint src scripts

      - name: Format
        run: harn fmt --check src scripts

      - name: Regen drift check
        run: harn run scripts/regen.harn

      - name: Package install smoke
        shell: bash
        run: |
          set -euo pipefail
          smoke_root="$(mktemp -d)"
          trap 'rm -rf "$smoke_root"' EXIT
          cat > "$smoke_root/harn.toml" <<'EOF'
          [package]
          name = "notion-sdk-harn-consumer-smoke"
          version = "0.0.0"
          EOF
          cd "$smoke_root"
          harn add "$GITHUB_WORKSPACE@HEAD"
          printf 'import "notion-sdk-harn/default"\n' > smoke.harn
          harn check smoke.harn
