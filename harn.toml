[package]
name = "notion-sdk-harn"
version = "0.0.0"
description = "Typed Notion REST API SDK in pure Harn, generated via harn-openapi."
license = "MIT OR Apache-2.0"
repository = "https://github.com/burin-labs/notion-sdk-harn"

[exports]
default = "src/lib.harn"

# Until package management v0 (harn#345) lands, develop locally with the
# sibling path import. After #345, replace with a versioned git URL.
[dependencies]
harn-openapi = { path = "../harn-openapi" }
